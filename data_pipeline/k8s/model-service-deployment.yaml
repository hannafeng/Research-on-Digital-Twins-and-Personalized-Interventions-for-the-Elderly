apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-service
  namespace: elderly-care
  labels:
    app: model-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-service
  template:
    metadata:
      labels:
        app: model-service
    spec:
      containers:
      - name: model-service
        image: model-service:latest
        ports:
        - containerPort: 5000
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: QWEN_API_KEY
          value: ""
        - name: QWEN_API_URL
          value: "https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation"
        - name: QWEN_MODEL
          value: "qwen-plus"
        volumeMounts:
        - name: models-volume
          mountPath: /app/models
      volumes:
      - name: models-volume
        persistentVolumeClaim:
          claimName: models-pvc